syntax = "proto3";

// DESFire profile metadata for credentials known to Link and firmware.
package lastlock.api;



// How the DESFire application is selected on the card.
enum SelectMethod
{
  // phalMfdfEVx_SelectApplication (3-byte AID)
  SELECT_BY_AID = 0;
  // phalMfdfEVx_IsoSelectFile (uses df_name field)
  SELECT_BY_DF_NAME = 1;
}

// DESFire authentication command to use.
enum AuthMethod
{
  // phalMfdfEVx_AuthenticateAES (0xAA)
  AUTH_AES = 0;
  // phalMfdfEVx_AuthenticateISO (0x1A)
  AUTH_ISO = 1;
  // phalMfdfEVx_AuthenticateEv2 (0x71)
  AUTH_EV2 = 2;
}

// Key diversification method applied before authentication.
enum DivMethod
{
  // No diversification (PHAL_MFDFEVX_NO_DIVERSIFICATION)
  DIV_NONE = 0;
  // CMAC-based diversification (PHAL_MFDFEVX_DIV_METHOD_CMAC)
  DIV_CMAC = 1;
  // Encryption-based diversification (PHAL_MFDFEVX_DIV_METHOD_ENCR)
  DIV_ENCR = 2;
}

// How to finalize the card transaction after credential read.
enum CommitType
{
  // No commit (read-only, e.g. LEAF, AN10922 PACS)
  COMMIT_NONE = 0;
  // Complete Transaction 0x90 0xEE 
  COMMIT_COMPLETE_TRANSACTION = 1;
  // Commit Transaction 0x90 0xC7 (MIFARE 2GO)
  COMMIT_TRANSACTION = 2;
}

// Profile data associated with a card credential.
// Parameterizes a generic DESFire transaction executed in this order:
// 1. App selection  2. Authentication  3. File read
// 4. Credential extraction  5. Transaction completion
message DesfireProfile
{
  // --- Application selection ---

  // How to select the DESFire application on the card.
  optional SelectMethod select_method = 1;

  // 3-byte DESFire Application ID for the credential application.
  // Used when select_method is SELECT_BY_AID.
  optional bytes app_aid = 2;

  // DF Name for ISO file selection (up to 16 bytes).
  // Used when select_method is SELECT_BY_DF_NAME.
  optional bytes df_name = 17;

  // --- Privacy application (optional two-step authentication) ---

  // 3-byte AID for an optional privacy application.
  // When set, firmware first selects this app and authenticates with the
  // privacy key to obtain the real card UID (via GetCardUID), then selects
  // the credential application (app_aid) for the main authentication.
  optional bytes privacy_aid = 3;

  // Authentication method for the privacy application.
  optional AuthMethod privacy_auth_method = 4;

  // Diversification method for the privacy key.
  optional DivMethod privacy_div_method = 5;

  // Key number on the card for privacy authentication.
  optional uint32 privacy_key_num_on_card = 6;

  // --- Card UID retrieval ---

  // Issue a GetCardUID command after privacy auth.
  // The retrieved UID is used as diversification input for credential auth.
  optional bool get_card_uid = 7;

  // --- Credential authentication ---

  // Authentication method for the credential application.
  optional AuthMethod cred_auth_method = 8;

  // Diversification method for the credential key.
  optional DivMethod cred_div_method = 9;

  // Key number on the card for credential authentication.
  optional uint32 cred_key_num_on_card = 10;

  // --- File read parameters ---

  // DESFire file number to read (0x00-0x1F).
  optional uint32 file_number = 11;

  // Byte offset within the file to start reading (3-byte LE on wire).
  optional uint32 read_offset = 12;

  // Number of bytes to read. 0 means read the full file.
  optional uint32 read_length = 13;

  // --- Credential extraction from read data ---

  // Byte offset within the read data where the credential identifier starts.
  optional uint32 credential_offset = 14;

  // Number of bytes to extract as the credential identifier.
  // Must not exceed 32 bytes (the fixed size of the mifare_desfire_v3
  // credential field used for on-device hashtrie lookup).
  optional uint32 credential_length = 15;

  // --- Transaction completion ---

  // How to finalize the transaction after a successful credential read.
  optional CommitType commit_type = 16;

  optional uint32 privacy_key_slot = 18;

  optional uint32 credential_key_slot = 19;
}

// Full profile set to apply to devices.
message DesfireProfileSet
{
  repeated DesfireProfile profiles = 1;
  optional bytes ecp = 2;
}
